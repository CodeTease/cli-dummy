#
# REF:
#   1. https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstrategymatrixinclude
#
# Optimized for "CodeTease"
name: Create Release Draft

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target'
        required: false
        type: string
      os:
        description: 'OS'
        required: false
        type: string
  push:
    tags:
      - 'v*'

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  plan:
    name: Validate Plan
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: 0.109.1
      - name: Run Release Plan Validation
        id: plan
        run: nu .github/workflows/release-plan.nu

  release:
    name: CLI Dummy
    needs: plan

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON( inputs.target && inputs.os && format('[{{"os":"{0}","target":"{1}"}}]', inputs.os, inputs.target) || needs.plan.outputs.matrix ) }}

    runs-on: ${{matrix.os}}

    steps:
    - uses: actions/checkout@v6

    - name: Install Wix Toolset 6 for Windows
      shell: pwsh
      if: ${{ startsWith(matrix.os, 'windows') }}
      run: |
        dotnet tool install --global wix --version 6.0.0
        dotnet workload install wix
        $wixPath = "$env:USERPROFILE\.dotnet\tools"
        echo "$wixPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        $env:PATH = "$wixPath;$env:PATH"
        wix --version

    - name: Update Rust Toolchain Target
      run: |
        echo -e "[toolchain]\nchannel = 'stable'\ntargets = ['${{matrix.target}}']" > rust-toolchain.toml

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1.12.0
      # WARN: Keep the rustflags to prevent from the winget submission error: `CAQuietExec: Error 0xc0000135`
      with:
        cache: false
        rustflags: ''

    - name: Setup Nushell
      uses: hustcer/setup-nu@v3
      with:
        version: 0.109.1

    - name: Install nFPM
      run: |
        echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
        sudo apt update
        sudo apt install nfpm -y
      if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}

    - name: Install aria2
      # Needed for Ubuntu to download cross-toolchains
      if: ${{ startsWith(matrix.os, 'ubuntu') }}
      run: "sudo apt install aria2 -y"

    - name: Release Binary (Build & Package)
      run: nu .github/workflows/release.nu build
      env:
        OS: ${{ matrix.os }}
        TARGET: ${{ matrix.target }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: release-artifacts-${{ matrix.target }}
        path: |
          output/*.msi
          output/*.zip
          output/*.tar.gz
          output/*.deb
          output/*.rpm
          output/*.apk
        if-no-files-found: warn

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: 0.109.1

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: output
          merge-multiple: true

      - name: Setup UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install Cloudsmith CLI
        run: |
          sudo chown -R $USER /usr/local/lib/python* /usr/local/bin
          uv pip install --upgrade --system --break-system-packages cloudsmith-cli requests

      - name: Publish Release Assets & Cloudsmith
        run: nu .github/workflows/release.nu publish
        env:
          REF: ${{ github.ref }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sha256sum:
    needs: publish
    name: Create Sha256sum
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
    - name: Download Release Archives
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: >-
        gh release download ${{ github.ref_name }}
        --repo ${{ github.repository }}
        --pattern '*'
        --dir release
    - name: Create Checksums
      run: cd release && shasum -a 256 * > ../SHA256SUMS
    - name: Publish Checksums
      uses: softprops/action-gh-release@v2.0.5
      with:
        draft: true
        files: SHA256SUMS
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}