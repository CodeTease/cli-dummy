[metadata]
bin = "template"
version = "0.1.0"
repository = "https://github.com/your-name/your-repo"

# For future use
license = "MIT"
homepage = "https://github.com/your-name/your-repo"
maintainer = "your-name"
description = "Something about your tool"

[nfpm]
enable = true

[aur]
enable = true

[cloudsmith]
enable = true
repo = "your-name/your-repo"

[brew]
enable = true
tap = "your-name/homebrew-tap"

[scoop]
enable = true
bucket = "your-name/scoop-bucket"

[cloudsmith.targets]
deb = "ubuntu/noble"
rpm = "el/9"
apk = "alpine/any-version"

[installer]
enable = true
features = ["sh", "ps1"]
path = "~/.local/bin"
path-win = "C:/bin"

[targets]
"aarch64-apple-darwin" = true
"x86_64-apple-darwin" = true
"x86_64-pc-windows-msvc" = true
"x86_64-pc-windows-gnu" = true
"aarch64-pc-windows-msvc" = true
"x86_64-unknown-linux-gnu" = true
"x86_64-unknown-linux-musl" = true
"aarch64-unknown-linux-gnu" = true
"aarch64-unknown-linux-musl" = true
"armv7-unknown-linux-gnueabihf" = true
"armv7-unknown-linux-musleabihf" = true
"riscv64gc-unknown-linux-gnu" = true
"loongarch64-unknown-linux-gnu" = true
"loongarch64-unknown-linux-musl" = true
"i686-pc-windows-msvc" = true 
"i686-unknown-linux-gnu" = true
"s390x-unknown-linux-gnu" = true
"powerpc64le-unknown-linux-gnu" = true
