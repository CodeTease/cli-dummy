[package]
name = "cli-dummy"
version = "0.3.0"
authors = ["CodeTease"]
repository = "https://github.com/CodeTease/cli-dummy"
# For Homebrew
homepage = "https://github.com/CodeTease/cli-dummy"
license = "MIT"
description = "A dummy CLI tool"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
clap = "4.5.60"
reqwest = "0.13.2"
tokio = "1.50.0"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
