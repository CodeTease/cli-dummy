[metadata]
bin = "cli-dummy"
version = "0.4.1"
repository = "https://github.com/CodeTease/cli-dummy"
toolchain = "1.93.1"

# For future use
license = "MIT"
homepage = "https://github.com/CodeTease/cli-dummy"
maintainer = "CodeTease"
description = "A dummy CLI tool"

[nfpm]
enable = true

[archlinux]
enable = true

[cloudsmith]
enable = true
repo = "codetease/tools"
docs_path = "docs/REGISTRY.md"

[brew]
enable = true
tap = "CodeTease/homebrew-tap"

[scoop]
enable = true
bucket = "CodeTease/scoop-bucket"

[nuget]
enable = true
authors = "CodeTease"

[cloudsmith.targets]
deb = "ubuntu/noble"
rpm = "el/9"
apk = "alpine/any-version"

[msi]
enable = true

[installer]
enable = true
features = ["sh", "ps1"]
path = "~/.local/bin"
path-win = "C:/bin"

[docker]
enable = true
image_name = "cli-dummy"
github_org = "codetease"
templates = ["alpine", "debian-slim"]
registries = ["ghcr", "cloudsmith"]
# Service username, so it's quite different 
cloudsmith_docker_username = "codetease-imos"

[targets]
"aarch64-apple-darwin" = true
"x86_64-apple-darwin" = true
"x86_64-pc-windows-msvc" = true
"x86_64-pc-windows-gnu" = true
"aarch64-pc-windows-msvc" = true
"x86_64-unknown-linux-gnu" = true
"x86_64-unknown-linux-musl" = true
"aarch64-unknown-linux-gnu" = true
"aarch64-unknown-linux-musl" = true
"armv7-unknown-linux-gnueabihf" = true
"armv7-unknown-linux-musleabihf" = true
"riscv64gc-unknown-linux-gnu" = true
"loongarch64-unknown-linux-gnu" = true
"loongarch64-unknown-linux-musl" = true
"i686-pc-windows-msvc" = true
"i686-unknown-linux-gnu" = true
"s390x-unknown-linux-gnu" = true
"powerpc64le-unknown-linux-gnu" = true
